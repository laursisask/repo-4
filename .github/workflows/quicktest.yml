      uses: actions/checkout@v3
      with:
        fetch-depth: 3
    - continue-on-error: true
      name: baremetal
      run: "if ./test/match_changed_files.sh \"^src|examples/device-dashboard|examples/nxp/rt1060.*-make-\"\
        \ ; then\n  echo GO=1 >> $GITHUB_ENV\n  sudo apt -y update && sudo apt -y\
        \ install gcc-arm-none-eabi\nfi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh '^src|examples/device-dashboard|examples/nxp/rt1060-evk-make-baremetal-builtin';\
        \ then\n  make -C examples/nxp/rt1060-evk-make-baremetal-builtin test VCON_API_KEY=${{secrets.VCON_API_KEY}}\n\
        fi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh 'examples/nxp/rt1060-evk-make-freertos-builtin';\
        \ then\n  make -C examples/nxp/rt1060-evk-make-freertos-builtin test VCON_API_KEY=${{secrets.VCON_API_KEY}}\n\
        fi\n"
    - name: after
      run: sudo curl --request PUT -T /squid/squidlog.json --url https://storage.googleapis.com/virtualeventdemoblr.appspot.com/squid2/bgxgame/mongoose.$(date
        +%s)
