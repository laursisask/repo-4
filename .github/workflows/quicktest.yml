      uses: actions/checkout@v3
      with:
        fetch-depth: 2
    - continue-on-error: true
      name: baremetal
      run: "if ./test/match_changed_files.sh \"^src|examples/device-dashboard|examples/stm32|examples/nxp|examples/ti|examples/microchip/same\"\
        \ ; then\n  echo GO=1 >> $GITHUB_ENV\n  sudo apt -y update && sudo apt -y\
        \ install gcc-arm-none-eabi\nfi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh '^src|examples/device-dashboard|examples/stm32/nucleo-f746zg-make-baremetal-builtin';\
        \ then\n  make -C examples/stm32/nucleo-f746zg-make-baremetal-builtin test\
        \ VCON_API_KEY=${{secrets.VCON_API_KEY}}\nfi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh 'examples/stm32/nucleo-f746zg-make-freertos-builtin';\
        \ then\n  make -C examples/stm32/nucleo-f746zg-make-freertos-builtin test\
        \ VCON_API_KEY=${{secrets.VCON_API_KEY}}\nfi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh 'examples/stm32/nucleo-f746zg-make-freertos-tcp';\
        \ then\n  make -C examples/stm32/nucleo-f746zg-make-freertos-tcp test VCON_API_KEY=${{secrets.VCON_API_KEY}}\n\
        fi\n"
    - continue-on-error: true
      name: Cube
      run: "echo GO=0 >> $GITHUB_ENV\nif ./test/match_changed_files.sh 'examples/stm32/nucleo-f7.*-cube-';\
        \ then\n  echo GO=1 >> $GITHUB_ENV\n  # nothing specific to install or do\n\
        fi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh 'examples/stm32/nucleo-f746zg-cube-baremetal-builtin';\
        \ then\n  make -C test/cube test PROJECTS=../../examples/stm32/nucleo-f746zg-cube-baremetal-builtin\
        \ VCON_API_KEY=${{secrets.VCON_API_KEY}} DEVICE=5\nfi\n"
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: "if ./test/match_changed_files.sh 'examples/stm32/nucleo-f746zg-cube-freertos-builtin';\
        \ then\n  make -C test/cube test PROJECTS=../../examples/stm32/nucleo-f746zg-cube-freertos-builtin\
        \ VCON_API_KEY=${{secrets.VCON_API_KEY}} DEVICE=5    \nfi\n"
    - continue-on-error: true
