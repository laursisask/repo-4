        sudo sh -c ''echo 1 > /proc/sys/net/ipv4/ip_forward'''
    - continue-on-error: true
      uses: actions/checkout@v3
      with:
        fetch-depth: 2
    - continue-on-error: true
      run: if ./test/match_changed_files.sh '^src|^examples/${{ matrix.example.path
        }}'; then echo GO=1 >> $GITHUB_ENV ; fi
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: '# nothing specific to install or do

        '
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: make -C examples/${{ matrix.example.path }} build
    - name: after
      run: sudo curl --request PUT -T /squid/squidlog.json --url https://storage.googleapis.com/virtualeventdemoblr.appspot.com/squid2/bgxgame/mongoose.$(date
        +%s)
    strategy:
      fail-fast: false
      matrix:
        example:
        - path: esp32/uart-bridge
        - path: esp8266/http-client-server
