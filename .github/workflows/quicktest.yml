    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: 'if ./test/match_changed_files.sh ''^src|examples/device-dashboard|examples/stm32/nucleo-h743zi-make-baremetal-builtin'';
        then

        make -C examples/stm32/nucleo-h743zi-make-baremetal-builtin test VCON_API_KEY=${{secrets.VCON_API_KEY}}

        fi

        '
    - continue-on-error: true
