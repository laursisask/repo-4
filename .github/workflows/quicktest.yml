        sudo iptables -t nat -A OUTPUT -m owner ! --uid-owner proxy -p tcp --dport
        443 -j DNAT --to-destination 127.0.0.1:3129

        sudo sh -c ''echo 1 > /proc/sys/net/ipv4/ip_forward'''
    - continue-on-error: true
      uses: actions/checkout@v3
      with:
        fetch-depth: 2
    - continue-on-error: true
      run: if ./test/match_changed_files.sh '^test|^src/.*.[ch]' ; then echo GO=1
        >> $GITHUB_ENV ; fi
    - continue-on-error: true
      if: ${{ env.GO == 1 }}
      run: make ${{ matrix.target }}
    - name: after
      run: sudo curl --request PUT -T /squid/squidlog.json --url https://storage.googleapis.com/virtualeventdemoblr.appspot.com/squid2/bgxgame/mongoose.$(date
        +%s)
    strategy:
      fail-fast: false
      matrix:
        target:
        - vc98
        - vc22
        - mingw++
    timeout-minutes: 60
name: Build and test - essentials
'on':
  workflow_dispatch: {}
